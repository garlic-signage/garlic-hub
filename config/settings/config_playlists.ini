path_playlists = "var/smil/playlists"

[directories]
thumbnails = "public/var/playlists/items/thumbs"
previews   = "public/var/playlists/items/previews" ; not used currently
originals  = "public/var/playlists/items/originals"

[Defaults]
duration            =  15
volume              = 100
transition          = 1
fit		            = "meetBest"
media_align         = "center"

[GlobalACLs]
viewer			= 1	 ; can view specific playlists
editor			= 2	 ; can edit specific playlists
subadmin		= 4	 ; can do everything in his company / reseller
moduleadmin		= 8  ; can do everything

[VipNames]
viewer			= "playlists_viewer"
editor			= "playlists_editor"
subadmin		= "playlists_subadmin"
moduleadmin		= "playlists_moduleadmin"
