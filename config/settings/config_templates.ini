[directories]
thumbnails = "public/var/mediapool/thumbs"
previews   = "public/var/mediapool/previews" ; not used currently
originals  = "public/var/mediapool/originals"
icons      = "public/images/icons"


[GlobalACLs]
viewer			= 1	 ; can use specific templates
editor			= 2	 ; can edit specific templates
subadmin		= 4	 ; can do everything in his company / reseller
moduleadmin		= 8  ; can do everything

[VipNames]
viewer			= "templates_viewer"
editor			= "templates_editor"
subadmin		= "templates_subadmin"
moduleadmin		= "templates_moduleadmin"
